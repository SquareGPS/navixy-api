  /tracker/read:
    post:
      tags:
        - Tracking
      summary: Get tracker information by ID
      description: Retrieves detailed information about a specific tracker by its ID
      operationId: trackerRead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hash
                - tracker_id
              properties:
                hash:
                  type: string
                  description: Session hash for authentication
                  example: "a6aa75587e5c59c32d347da438505fc3"
                tracker_id:
                  type: integer
                  description: ID of the tracker (aka object_id)
                  example: 123456
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponseWithValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /tracker/list:
