components:
  securitySchemes:
    HashAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Session hash authentication. Can be provided as:
        1. Authorization header: `Authorization: NVX {hash}`
        2. hash parameter in request body
        3. hash query parameter (not recommended)
      x-example: "NVX a6aa75587e5c59c32d347da438505fc3"

  schemas:
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          example: true

    SuccessResponseWithValue:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            value:
              description: Response value (structure varies by endpoint)
              type: object

    SuccessResponseWithList:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            list:
              description: Response list (structure varies by endpoint)
              type: array
              items:
                type: object

    SuccessResponseWithResult:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            result:
              description: Response result (structure varies by endpoint)
              type: object

    ErrorResponse:
      type: object
      required:
        - success
        - status
      properties:
        success:
          type: boolean
          example: false
        status:
          $ref: '#/components/schemas/ErrorStatus'

    ErrorStatus:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: integer
          description: Error code (1-100 for common errors, 101-300 for resource-specific errors)
          example: 201
        description:
          type: string
          description: Human-readable error description
          example: "Not found in database"

    Tracker:
      type: object
      properties:
        id:
          type: integer
          description: Tracker ID (aka object_id)
          example: 123456
        label:
          type: string
          description: Tracker label
          example: "tracker label"
        clone:
          type: boolean
          description: true if this tracker is a clone
          example: false
        group_id:
          type: integer
          description: Tracker group ID, 0 when no group
          example: 167
        avatar_file_name:
          type: string
          description: Avatar file name (optional)
          example: "file name"
        source:
          $ref: '#/components/schemas/TrackerSource'
        tag_bindings:
          type: array
          description: List of attached tags
          items:
            $ref: '#/components/schemas/TagBinding'

    TrackerSource:
      type: object
      properties:
        id:
          type: integer
          description: Source ID
          example: 234567
        device_id:
          type: string
          description: Device ID (aka source_imei)
          example: "9999999988888"
        model:
          type: string
          description: Tracker model name
          example: "telfmb920"
        blocked:
          type: boolean
          description: true if tracker blocked due to tariff end
          example: false
        tariff_id:
          type: integer
          description: ID of tracker tariff
          example: 345678
        status_listing_id:
          type: integer
          nullable: true
          description: ID of the status listing associated with this tracker, or null
        creation_date:
          type: string
          format: date-time
          description: Date when the tracker was registered
          example: "2011-09-21"
        tariff_end_date:
          type: string
          format: date-time
          nullable: true
          description: Date of next tariff prolongation, or null
          example: "2016-03-24"
        phone:
          type: string
          nullable: true
          description: Phone of the device. Can be null or empty if device has no GSM module
          example: "71234567890"

    TagBinding:
      type: object
      properties:
        tag_id:
          type: integer
          description: ID of tag. Must be unique for a tracker
          example: 456789
        ordinal:
          type: integer
          description: Number that can be used as ordinal or kind of tag. Must be unique for a tracker. Max value is 5
          example: 4

    TrackInfo:
      type: object
      description: Track information object
      properties:
        id:
          type: integer
          description: Track ID
        start_date:
          type: string
          format: date-time
          description: Track start date in user's timezone
        start_address:
          type: string
          description: Track start address
        max_speed:
          type: integer
          description: Maximum speed registered during track in km/h
        end_date:
          type: string
          format: date-time
          description: Track end date in user's timezone
        end_address:
          type: string
          description: Track end address
        length:
          type: number
          format: float
          description: Track length in kilometers
        points:
          type: integer
          description: Total number of points in a track
        avg_speed:
          type: integer
          description: Average speed in km/h
        event_count:
          type: integer
          description: Number of events recorded during this track
        norm_fuel_consumed:
          type: number
          format: float
          description: Amount of fuel consumed during the track in litres
        type:
          type: string
          enum:
            - regular
            - single_report
            - merged
            - cluster
          description: Track type
        gsm_lbs:
          type: boolean
          description: GSM LBS point flag
        points_list:
          type: array
          items:
            $ref: '#/components/schemas/TrackPoint'
          description: List of track points
        bounds:
          type: object
          properties:
            nw:
              $ref: '#/components/schemas/Location'
            se:
              $ref: '#/components/schemas/Location'

    TrackPoint:
      type: object
      description: Individual track point
      properties:
        lat:
          type: number
          format: float
          description: Latitude
        lng:
          type: number
          format: float
          description: Longitude
        get_time:
          type: string
          format: date-time
          description: GPS timestamp of the point
        heading:
          type: integer
          description: Direction bearing in degrees (0-360)
        speed:
          type: integer
          description: Speed in km/h
        satellites:
          type: integer
          description: Number of satellites used in fix
        precision:
          type: integer
          nullable: true
          description: Precision in meters
        alt:
          type: integer
          nullable: true
          description: Altitude in meters

    Location:
      type: object
      properties:
        lat:
          type: number
          format: float
          description: Latitude
        lng:
          type: number
          format: float
          description: Longitude

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request format
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 7
              description: "Invalid parameters"

    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 3
              description: "Wrong hash"

    Forbidden:
      description: Forbidden - access denied or operation not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 11
              description: "Access denied"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 201
              description: "Not found in database"

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 15
              description: "Too many requests (rate limit exceeded)"

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            status:
              code: 1
              description: "Database error"
