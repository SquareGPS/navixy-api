openapi: 3.0.3
info:
  title: Navixy Backend API
  description: |
    Comprehensive API specification for the Navixy Backend API. This API provides access to GPS tracking, 
    vehicle management, fleet operations, and related telematics services.
    
    ## Authentication
    All endpoints require authentication via a session hash (API key hash). The hash can be provided in three ways:
    1. As a `hash` parameter in the request body (recommended for POST requests)
    2. As a `hash` query parameter (not recommended for production)
    3. As an `Authorization` header: `Authorization: NVX {hash}`
    
    ## Rate Limits
    The API enforces rate limits of 50 requests per second per user and per IP address.
    
    ## Response Format
    All responses follow a standard format:
    - Success: `{success: true, value/list/result: ...}`
    - Error: `{success: false, status: {code: integer, description: string}}`
    
    ## Error Handling
    Errors are returned with appropriate HTTP status codes and include a `status` object with error code and description.
    Common error codes range from 1-100, while resource-specific errors use codes 101-300.
  version: 2.0.0
  contact:
    name: Navixy API Support
  license:
    name: Proprietary

servers:
  - url: https://api.eu.navixy.com/v2
    description: EU Server
  - url: https://api.us.navixy.com/v2
    description: US Server
  - url: https://api.your_domain/v2
    description: On-Premise Installation (replace with your domain)

tags:
