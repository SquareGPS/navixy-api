              properties:
                hash:
                  type: string
                  description: Session hash for authentication
                  example: "a6aa75587e5c59c32d347da438505fc3"
                labels:
                  type: array
                  description: Optional list of tracker label filters
                  items:
                    type: string
                    minLength: 1
                    maxLength: 60
                  minItems: 1
                  maxItems: 1024
                  example: ["aa", "b"]
      responses:
        '200':
          description: Successful response
          content:
