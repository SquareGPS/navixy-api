      operationId: trackList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hash
                - tracker_id
              properties:
                hash:
                  type: string
                  description: Session hash for authentication
                tracker_id:
                  type: integer
                  description: ID of the tracker
                from:
                  type: string
                  format: date-time
                  description: Start date/time for track points
                to:
                  type: string
                  format: date-time
                  description: End date/time for track points
                filter:
                  type: boolean
                  description: If true, returned tracks will be filtered (default true)
                  default: true
                count_events:
                  type: boolean
                  description: If true, count events during each trip
                  default: false
                with_points:
                  type: boolean
                  description: If true, track point lists will be included
                  default: false
                point_limit:
                  type: integer
                  description: Maximum number of points to return (min 2, max 3000)
                  minimum: 2
                  maximum: 3000
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  limit_exceeded:
                    type: boolean
                    description: true if requested time period exceeds tariff limit
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrackInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
