# =============================================================================
# 9. INTERFACES
# =============================================================================

# @category: common
"An object with a globally unique identifier."
interface Node {
  "A globally unique identifier. This ID is opaque and should not be parsed by clients."
  id: ID!
}

# @category: common
"An object with a human-readable display name."
interface Titled {
  "The human-readable display name."
  title: String!
}

# @category: common
"An object that supports custom field values."
interface Customizable {
  """
  Custom field values as a key-value map.
  Keys are `CustomFieldDefinition` codes.
  """
  customFields(
    "Limit returned fields to these codes. Returns all fields if not specified."
    codes: [Code!]
  ): JSON!
}

# @category: common
"An object that supports optimistic locking for concurrency control."
interface Versioned {
  """
  The version number for optimistic locking.
  Incremented on each update. Can be provided in update/delete mutations to prevent lost updates.
  If omitted, the update proceeds without stale-read protection.
  """
  version: Int!
}

# @category: common
"An interface for field parameters that support selecting multiple values."
interface MultiValue {
  "Whether multiple values can be selected for this field."
  isMulti: Boolean!
}

# @category: devices/inventory
"An object that can be assigned to an inventory."
interface InventoryItem implements Node {
  "A globally unique identifier."
  id: ID!
  "The inventory this item is currently assigned to."
  inventory: Inventory
}

# @category: common
"An edge in a paginated connection."
interface Edge {
  "An opaque cursor for this edge, used for pagination."
  cursor: String!
}

# @category: common
"A paginated connection following the Relay Cursor Connections specification."
interface Connection {
  "Information about the current page."
  pageInfo: PageInfo!
  "The total count of items matching the filter."
  total: CountInfo
}

# @category: actors
"An entity that can perform actions and have permissions assigned."
interface Actor implements Node & Titled {
  "A globally unique identifier."
  id: ID!
  "The display name of the actor."
  title: String!
}

# @category: catalogs/catalog-items
"A dictionary item that provides reference data for the system."
interface CatalogItem implements Node & Versioned & Titled {
  "A globally unique identifier."
  id: ID!
  "The version number for optimistic locking."
  version: Int!
  "The human-readable display name. Can be localized."
  title: String!
  "A machine-readable code, unique within the catalog scope."
  code: Code!
  "The display order within the same level or category."
  order: Int!
  "The catalog this item belongs to."
  catalog: Catalog!
  "The organization that owns this item. Null for system items."
  organization: Organization
  "Metadata about this item including description, origin, and display properties."
  meta: CatalogItemMeta!
}

# @category: catalogs/catalog-items
"Metadata about a catalog item."
type CatalogItemMeta {
  "A description of the catalog item. Can be localized."
  description: String
  "The origin indicating how this item was created."
  origin: CatalogItemOrigin!
  "Whether this item can be deleted. Returns `false` if the item has dependencies or is system-managed."
  canBeDeleted: Boolean!
  "Whether this item is hidden from regular UI lists."
  hidden: Boolean!
}

# @category: catalogs/catalog-items
"A catalog item that supports parent-child hierarchy."
interface HierarchicalCatalogItem {
  "The parent item in the hierarchy. Null for root items."
  parent: CatalogItem
}

# =============================================================================
# 10. PAGINATION TYPES
# =============================================================================

# @category: common
"Information about the current page in a paginated connection."
type PageInfo {
  "Whether more items exist after the current page."
  hasNextPage: Boolean!
  "Whether more items exist before the current page."
  hasPreviousPage: Boolean!
  "The cursor pointing to the first item in the current page."
  startCursor: String
  "The cursor pointing to the last item in the current page."
  endCursor: String
}

# Pagination follows Relay Cursor Connections specification.
# Arguments are provided directly on connection fields:
#   first: Int     - Number of items to fetch from start (default: 20, max: 100)
#   after: String  - Cursor to start after (forward pagination)
#   last: Int      - Number of items to fetch from end
#   before: String - Cursor to end before (backward pagination)
#
# If neither `first` nor `last` is specified, the server defaults to first: 20.

# @category: common
"Information about the total count of items in a connection."
type CountInfo {
  "The count of items matching the filter."
  count: Int!
  "The precision level of the count value."
  precision: CountPrecision!
}

