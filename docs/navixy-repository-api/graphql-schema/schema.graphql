# --- Custom Field Filter ---

# @category: custom-fields
"""
Typed filter value for custom fields. Exactly one field must be set (`@oneOf`).
Choose the variant that matches the custom field's data type:

| FieldType         | Variant      | Example                                |
|-------------------|--------------|----------------------------------------|
| STRING, TEXT      | `string`     | `{ string: "hello" }`                  |
| NUMBER            | `number`     | `{ number: 42.0 }`                     |
| BOOLEAN           | `boolean`    | `{ boolean: true }`                    |
| DATE              | `date`       | `{ date: "2024-01-15" }`              |
| DATETIME          | `datetime`   | `{ datetime: "2024-01-15T10:30:00Z" }`|
| OPTIONS, CATALOG, TAG | `string` | `{ string: "option_code" }`            |
| DEVICE, REFERENCE | `id`         | `{ id: "019a6a3f-..." }`              |
| (IN operator)     | `stringList` | `{ stringList: ["a", "b"] }`           |
| (IN operator)     | `idList`     | `{ idList: ["uuid1", "uuid2"] }`       |
"""
input CustomFieldFilterValue @oneOf {
  "String value — for STRING, TEXT, OPTIONS, CATALOG, TAG fields."
  string: String
  "Numeric value — for NUMBER fields."
  number: Float
  "Boolean value — for BOOLEAN fields."
  boolean: Boolean
  "Date value — for DATE fields."
  date: Date
  "Date-time value — for DATETIME fields."
  datetime: DateTime
  "ID value — for DEVICE, REFERENCE fields."
  id: ID
  "List of strings — for IN operator on string-based fields."
  stringList: [String!]
  "List of IDs — for IN operator on reference fields."
  idList: [ID!]
}

# @category: custom-fields
"A filter condition for a custom field value."
input CustomFieldFilter {
  "The custom field code to filter by."
  code: Code!
  "The comparison operator."
  operator: FieldOperator!
  "The value to compare against. Null for `IS_NULL` and `IS_NOT_NULL` operators."
  value: CustomFieldFilterValue
}

#
# OPERATOR RULES:
#   - IS_NULL / IS_NOT_NULL: `value` must be null or omitted
#   - IN: `value` must use `stringList` or `idList` variant
#   - All other operators: `value` is a single-value variant
#
# MULTI-VALUE FIELDS (isMulti=true):
#   Filter matches if ANY value in the array satisfies the condition.
#   Example: field=["red","blue"], filter={operator:EQ, value:{string:"red"}} → match
#
# Invalid `value` format returns VALIDATION_ERROR with status 400.
#

