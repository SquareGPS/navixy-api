    "The input fields for adding the identifier."
    input: DeviceIdentifierAddInput!
  ): DeviceIdentifierPayload

  # @category: devices
  "Removes an identifier from a device."
  deviceIdentifierRemove(
    "The input fields for removing the identifier."
    input: DeviceIdentifierRemoveInput!
  ): DeletePayload

  # --- Assets ---

  # @category: assets
  "Creates a new asset."
  assetCreate(
    "The input fields for creating the asset."
    input: AssetCreateInput!
  ): AssetPayload

  # @category: assets
  "Updates an existing asset."
