#
# FILTER SEMANTICS
# ----------------
# Array-based filters use OR logic within a field and AND logic between fields.
#
# Example:
#   filter: {
#     typeIds: ["type1", "type2"]    # type1 OR type2
#     statusIds: ["active"]          # AND status = active
#   }
