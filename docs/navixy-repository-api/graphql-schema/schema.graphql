# =============================================================================
# 1. API OVERVIEW & CONVENTIONS
# =============================================================================
#
# ENTITY IDENTIFIERS (ID)
# -----------------------
# All entity IDs are opaque strings in UUID format.
# Example: "019a6a3f-793e-807b-8001-555345529b44"
#
# Implementation note: Internally, IDs use UUID v8 (RFC 9562) format with
# embedded entity type information. This structure is exposed for debugging
# convenience only — relying on it in production code is at your own risk,
# as the internal format may change without notice.
#
# Clients should treat IDs as opaque strings and not parse them.
# Use Query.node(id) or Query.nodes(ids) for entity resolution.
#
# CATALOG SYSTEM (Dictionaries)
# ----------------------------
# Catalogs are dictionaries/reference data used throughout the system.
# Three types of catalog items by origin:
#
#   SYSTEM              - Predefined by Navixy, immutable, available to all
#   ORGANIZATION        - Created by specific organization
#   PARENT_ORGANIZATION - Inherited from parent organization (dealer model)
#
# Catalog items support:
#   - Hierarchical structures (parent/children) for some types
#   - Localization (title, description)
#   - Custom display properties (icon, colors)
#   - Soft delete with restore capability
#
# HIERARCHICAL CATALOG ITEMS
# --------------------------
# Some catalog items support parent-child hierarchy (e.g., UserCatalogItem).
# These implement HierarchicalCatalogItem interface.
#
# ACCESS CONTROL MODEL (ACL)
# --------------------------
# RBAC (Role-Based Access Control) with three levels:
#
#   Role           - Named set of permissions (e.g., "Fleet Manager")
#   Permission     - Scope + Actions (e.g., "device.manage: READ, UPDATE")
#   UserScope      - Optional whitelist filter per actor
#
# Effective permissions = Role permissions ∩ UserScope (if present)
#
# CONTENT NEGOTIATION
# -------------------
# Request:
#   Content-Type: application/json
#   Accept: application/graphql-response+json
#
# Response:
#   Content-Type: application/graphql-response+json
#
# INTROSPECTION
# -------------
# Introspection queries require authentication.
# Anonymous introspection is disabled for security.
#
# RATE LIMITING & QUERY COMPLEXITY
# --------------------------------
# API enforces limits on:
#   - Request rate (per actor, per IP)
#   - Query depth (max nesting level)
#   - Query complexity (weighted field cost)
#
# Exceeding limits returns RATE_LIMITED error (429).
# Specific limits documented in API portal.
#
# FILTERING & SORTING
# -------------------
# Filter semantics:
#   - Within a field: OR (any value matches)
#   - Between fields: AND (all conditions must match)
#   - Empty array / null: ignored (no filtering on this field)
#
# Example:
#   filter: { typeIds: ["a", "b"], statusIds: ["active"] }
#   → (type IN ['a', 'b']) AND (status = 'active')
#
# Sorting:
#   - Text fields use natural sorting (ICU collation, case-insensitive)
#   - NULL values: sorted LAST for ASC, FIRST for DESC
#   - Custom fields can be used for sorting via `customFieldCode` parameter
#
# Note: Complex filtering with AND/OR/NOT operators is not currently supported.
#
# VERSIONING & DEPRECATION
# ------------------------
# This API follows evolutionary versioning without breaking changes.
#
# Deprecation process:
#   1. Field marked with @deprecated(reason: "Use X instead. Removal: YYYY-QN")
#   2. Deprecation announced in changelog with migration guide
#   3. Minimum deprecation period: 6 months
#   4. Field removed only after deprecation period
#
# Breaking changes:
#   Breaking changes are avoided. If unavoidable:
#   - New field/type introduced alongside old
#   - Old field deprecated with migration period
#   - Major version bump in schema version comment
#
# =============================================================================

# =============================================================================
# 2. OPTIMISTIC LOCKING
# =============================================================================
#
# This API uses version fields for optimistic concurrency control.
# This prevents lost updates when multiple clients modify the same entity.
#
# HOW IT WORKS:
#
#   # 1. Query returns version
#   query {
#     device(id: "...") {
#       id
#       version    # -> 5
#       title
#     }
#   }
#
#   # 2. Mutation requires version in input
#   mutation {
#     deviceUpdate(input: {
#       id: "..."
#       version: 5          # <- required for update
#       title: "New name"
#     }) {
#       device {
#         id
#         version          # -> 6 (incremented)
#         title
#       }
#     }
#   }
#
# OPERATIONS:
#
#   | Operation | version in input | Behavior                              |
#   |-----------|------------------|---------------------------------------|
#   | Create    | Not required     | Returns version: 1                    |
#   | Update    | Optional         | If provided: 409 Conflict if mismatch |
#   |           |                  | If omitted: uses current DB version   |
#   | Delete    | Optional         | If provided: 409 Conflict if mismatch |
#   |           |                  | If omitted: deletes without check     |
#
# VERSION MISMATCH:
#   If version is provided and the entity has been modified since you fetched it:
#   - HTTP Status: 200 (per GraphQL-over-HTTP spec)
#   - Error code: CONFLICT
#   - Error extensions include: status=409, expectedVersion, currentVersion
#   If version is omitted, the client is not protected against stale reads
#   (e.g., editing a form while another user modifies the same entity).
#   Concurrent server-side modifications are still detected.
#
# =============================================================================
#
# IDEMPOTENT COMMANDS:
#   Mutations that manage relationships and assignments (link/unlink/assign/revoke)
#   are idempotent commands. They do NOT require or check `version`.
#
#   - Repeated `link` when relationship already exists → success (no-op)
#   - Repeated `unlink/revoke` when relationship is absent → success (no-op)
#
#   Examples: deviceInventoryLink, deviceInventoryUnlink, roleAssign, roleRevoke,
#   permissionGrant, permissionRevoke, userScopeSet, userScopeRemove,
#   assetGroupItemsAdd, assetGroupItemsRemove, deviceIdentifierAdd, deviceIdentifierRemove.

# =============================================================================
# 3. LOCALIZATION
# =============================================================================
#
# All localizable fields (title, description, label) are automatically
# resolved based on the locale specified in HTTP headers.
#
# REQUEST HEADERS:
#   Accept-Language: es-419
#   -- or --
#   X-Locale: es-419
#
# X-Locale takes precedence over Accept-Language if both are present.
#
# FALLBACK BEHAVIOR:
#   If translation for requested locale is not found, English (en) is returned.
#
# =============================================================================

# =============================================================================
# 4. ERROR HANDLING
# =============================================================================
#
# This API follows the GraphQL specification (2024) for error handling and
# enriches error responses with RFC 9457 "Problem Details for HTTP APIs"
# in the extensions field.
#
# -----------------------------------------------------------------------------
# GRAPHQL ERROR RESPONSE FORMAT (per specification)
# -----------------------------------------------------------------------------
#
# All errors are returned in the standard `errors` array. Each error object
# contains the following fields as defined by the GraphQL specification:
#
#   {
#     "errors": [
#       {
#         "message": "Human-readable error description",
#         "locations": [{ "line": 3, "column": 5 }],
#         "path": ["deviceUpdate", "device", "title"],
#         "extensions": { ... }
#       }
#     ],
#     "data": { ... } | null
#   }
#
# FIELD DEFINITIONS:
#
#   message    - Required. A human-readable description of the error.
#                Should NOT be parsed programmatically; use extensions.code instead.
#
#   locations  - Optional. Array of locations in the GraphQL document where
#                the error occurred. Each location has:
#                - line: Line number (1-indexed)
#                - column: Column number (1-indexed)
#
#   path       - Optional. The path to the field that caused the error.
#                For execution errors, this is the path from root to the
#                field that raised the error. Array elements use 0-based index.
#                Example: ["devices", "edges", 0, "node", "customFields"]
#
#   extensions - Optional but ALWAYS provided by this API. Contains structured
#                error details following RFC 9457 format.
#
# -----------------------------------------------------------------------------
# ERROR EXTENSIONS (RFC 9457 Problem Details)
# -----------------------------------------------------------------------------
#
# The extensions object follows RFC 9457 structure with additional context:
#
#   {
#     "extensions": {
#       // RFC 9457 standard fields
#       "type": "https://api.navixy.com/errors/not-found",
#       "title": "Resource Not Found",
#       "status": 404,
#       "detail": "Device with ID '019a6a3f-...' does not exist",
#       "instance": "/graphql",
#
#       // API-specific fields
#       "code": "NOT_FOUND",
#       "traceId": "0af7651916cd43dd8448eb211c80319c",
#       "timestamp": "2024-01-15T10:30:00.123Z",
#
#       // Context-specific fields (vary by error type)
#       "field": "email",
#       "entityType": "Device",
#       "entityId": "019a6a3f-793e-807b-8001-555345529b44",
#       "expectedVersion": 5,
#       "currentVersion": 7,
#       "constraint": "uq_device_identifier",
#       "allowedValues": ["ACTIVE", "INACTIVE", "MAINTENANCE"]
#     }
#   }
#
# EXTENSIONS FIELD REFERENCE:
#
#   | Field           | Type     | Description                                    |
#   |-----------------|----------|------------------------------------------------|
#   | type            | String!  | RFC 9457 problem type URI (stable identifier)  |
#   | title           | String!  | Short human-readable title (stable per type)   |
#   | status          | Int!     | HTTP status code equivalent                    |
#   | detail          | String   | Specific explanation for this occurrence       |
#   | instance        | String   | Request path (always "/graphql" for this API)  |
#   | code            | String!  | Machine-readable error code for client logic   |
#   | traceId         | String   | W3C Trace ID for distributed tracing (32 hex)  |
#   | timestamp       | String   | ISO 8601 timestamp when error occurred         |
#   | field           | String   | Field name for validation errors               |
#   | entityType      | String   | Entity type code for entity-related errors     |
#   | entityId        | String   | Entity ID for entity-related errors            |
#   | expectedVersion | Int      | Expected version for CONFLICT errors           |
#   | currentVersion  | Int      | Actual version for CONFLICT errors             |
#   | constraint      | String   | Database constraint name for DUPLICATE errors  |
#   | allowedValues   | [String] | Valid options for enum validation errors       |
#
# -----------------------------------------------------------------------------
# ERROR CODES REFERENCE
# -----------------------------------------------------------------------------
#
#   | Code                | Type URI                                   | Status | Description                           |
#   |---------------------|--------------------------------------------|--------|---------------------------------------|
#   | UNAUTHORIZED        | .../errors/unauthorized                    | 401    | Missing or invalid authentication     |
#   | PERMISSION_DENIED   | .../errors/forbidden                       | 403    | Insufficient permissions              |
#   | NOT_FOUND           | .../errors/not-found                       | 404    | Entity does not exist                 |
#   | VALIDATION_ERROR    | .../errors/validation                      | 400    | Input validation failed               |
#   | CONFLICT            | .../errors/conflict                        | 409    | Optimistic lock version mismatch      |
#   | DUPLICATE           | .../errors/duplicate                       | 409    | Unique constraint violation           |
#   | RATE_LIMITED        | .../errors/rate-limited                    | 429    | Too many requests                     |
#   | QUERY_TOO_COMPLEX   | .../errors/query-too-complex               | 400    | Query exceeds complexity limit        |
#   | QUERY_TOO_DEEP      | .../errors/query-too-deep                  | 400    | Query exceeds depth limit             |
#   | INTERNAL_ERROR      | .../errors/internal                        | 500    | Unexpected server error               |
#   | SERVICE_UNAVAILABLE | .../errors/service-unavailable             | 503    | Downstream service unavailable        |
#
#   Base URI: https://api.navixy.com
#
# -----------------------------------------------------------------------------
# ERROR EXAMPLES
# -----------------------------------------------------------------------------
#
# EXAMPLE 1: Entity not found
#
#   Request:
#     query { device(id: "non-existent-id") { title } }
#
#   Response:
#     {
#       "errors": [{
#         "message": "Device not found",
#         "path": ["device"],
#         "locations": [{ "line": 1, "column": 9 }],
#         "extensions": {
#           "type": "https://api.navixy.com/errors/not-found",
#           "title": "Resource Not Found",
#           "status": 404,
#           "detail": "Device with ID 'non-existent-id' does not exist",
#           "code": "NOT_FOUND",
#           "entityType": "Device",
#           "entityId": "non-existent-id",
#           "traceId": "0af7651916cd43dd8448eb211c80319c"
#         }
#       }],
#       "data": { "device": null }
#     }
#
# EXAMPLE 2: Validation error
#
#   Request:
#     mutation { deviceCreate(input: { title: "", typeId: "..." }) { device { id } } }
#
#   Response:
#     {
#       "errors": [{
#         "message": "Validation failed: title must not be empty",
#         "path": ["deviceCreate"],
#         "locations": [{ "line": 1, "column": 12 }],
#         "extensions": {
#           "type": "https://api.navixy.com/errors/validation",
#           "title": "Validation Error",
#           "status": 400,
#           "detail": "Field 'title' must not be empty",
#           "code": "VALIDATION_ERROR",
#           "field": "input.title",
#           "traceId": "1bf7651916cd43dd8448eb211c80319d"
#         }
#       }],
#       "data": null
#     }
#
# EXAMPLE 3: Optimistic locking conflict
#
#   Request:
#     mutation { deviceUpdate(input: { id: "...", version: 5, title: "New" }) { ... } }
#
#   Response:
#     {
#       "errors": [{
#         "message": "Conflict: entity was modified by another request",
#         "path": ["deviceUpdate"],
#         "locations": [{ "line": 1, "column": 12 }],
#         "extensions": {
#           "type": "https://api.navixy.com/errors/conflict",
#           "title": "Optimistic Lock Conflict",
#           "status": 409,
#           "detail": "Device was modified. Expected version 5, current version 7",
#           "code": "CONFLICT",
#           "entityType": "Device",
#           "entityId": "019a6a3f-793e-807b-8001-555345529b44",
#           "expectedVersion": 5,
#           "currentVersion": 7,
#           "traceId": "2cf7651916cd43dd8448eb211c80319e"
#         }
#       }],
#       "data": null
#     }
#
# EXAMPLE 4: Duplicate constraint violation
#
#   Request:
#     mutation { deviceIdentifierAdd(input: { deviceId: "...", identifier: { type: IMEI, value: "123456789012345" } }) { ... } }
#
#   Response:
#     {
#       "errors": [{
#         "message": "Duplicate: IMEI '123456789012345' already exists",
#         "path": ["deviceIdentifierAdd"],
#         "locations": [{ "line": 1, "column": 12 }],
#         "extensions": {
#           "type": "https://api.navixy.com/errors/duplicate",
#           "title": "Duplicate Entry",
#           "status": 409,
#           "detail": "Device identifier with type 'IMEI' and value '123456789012345' already exists",
#           "code": "DUPLICATE",
#           "constraint": "uq_device_identifier_global",
#           "field": "input.identifier.value",
#           "traceId": "3df7651916cd43dd8448eb211c80319f"
#         }
#       }],
#       "data": null
#     }
#
# EXAMPLE 5: Multiple errors (batch mutation via aliases)
#
#   Request:
#     mutation {
#       d1: deviceUpdate(input: { id: "id1", version: 1, title: "A" }) { device { id } }
#       d2: deviceUpdate(input: { id: "id2", version: 3, title: "B" }) { device { id } }
#     }
#
#   Response (partial success):
#     {
#       "errors": [{
#         "message": "Device not found",
#         "path": ["d2"],
#         "extensions": {
#           "code": "NOT_FOUND",
#           "entityType": "Device",
#           "entityId": "id2",
#           ...
#         }
#       }],
#       "data": {
#         "d1": { "device": { "id": "id1" } },
#         "d2": null
#       }
#     }
#
# -----------------------------------------------------------------------------
# PARTIAL SUCCESS AND NULL HANDLING
# -----------------------------------------------------------------------------
#
# GraphQL allows partial success: some fields may resolve successfully while
# others fail. The `data` field structure mirrors the query structure.
#
# RULES:
#
#   1. If a non-nullable field fails, error bubbles up to nearest nullable parent
#   2. The `path` in error points to the exact field that failed
#   3. Nullable mutation payloads allow batch operations with partial success
#   4. Client should check both `errors` and `data` in every response
#
# NULL PROPAGATION:
#
#   Query: { device(id: "...") { title organization { name } } }
#
#   If organization resolver fails:
#   - organization field becomes null
#   - device field becomes null (because organization is non-nullable in type)
#   - path: ["device", "organization"]
#
# -----------------------------------------------------------------------------
# HTTP STATUS CODES
# -----------------------------------------------------------------------------
#
# This API follows GraphQL-over-HTTP specification for HTTP status codes.
# HTTP status indicates transport-level result, NOT domain-level errors.
#
# TRANSPORT-LEVEL (HTTP status):
#   | HTTP Status | Meaning                                           |
#   |-------------|---------------------------------------------------|
#   | 200         | Request processed (check `errors` for failures)   |
#   | 400         | Invalid HTTP/GraphQL request (parse/validation)   |
#   | 401         | Authentication required or invalid                |
#   | 403         | Authorization failed (forbidden)                  |
#   | 429         | Rate limit exceeded                               |
#   | 5xx         | Infrastructure/system error                       |
#
# DOMAIN-LEVEL (extensions.status):
#   All business logic errors (NOT_FOUND, CONFLICT, VALIDATION_ERROR, etc.)
#   are returned with HTTP 200. The semantic status code is in extensions.status.
#
#   Example: Entity not found returns HTTP 200 with extensions.status = 404.
#
# Rule: Use `extensions.code` for programmatic handling, NOT HTTP status.
#
# -----------------------------------------------------------------------------
# CLIENT ERROR HANDLING RECOMMENDATIONS
# -----------------------------------------------------------------------------
#
# 1. Always check for `errors` array presence
# 2. Use `extensions.code` for programmatic error handling, not `message`
# 3. Display `message` or `extensions.detail` to users
# 4. Log `extensions.traceId` for support requests
# 5. Handle partial success: check each field in `data`
# 6. For CONFLICT errors: refetch entity and retry or prompt user
# 7. For RATE_LIMITED: implement exponential backoff
#
# =============================================================================

# =============================================================================
# 5. DISTRIBUTED TRACING & SOURCE TYPE
# =============================================================================
#
# TRACE CONTEXT
#
# HTTP REQUESTS:
#   Header: traceparent (W3C Trace Context format)
#   Format: 00-{trace-id}-{parent-id}-{flags}
#   Example: traceparent: 00-0af7651916cd43dd8448eb211c80319c-b7ad6b7169203331-01
#
#   The trace-id (32 hex characters) is extracted and stored in audit events.
#
# WEBSOCKET / GRAPHQL EXTENSIONS:
#   For WebSocket connections or when headers are not available,
#   trace context can be passed in GraphQL request extensions:
#
#   {
#     "query": "mutation { ... }",
#     "extensions": {
#       "traceId": "0af7651916cd43dd8448eb211c80319c"
#     }
#   }
#
# SOURCE TYPE:
#   The sourceType field in audit events is determined from JWT claims
#   during authentication. It identifies the origin of the request:
#   WEB, MOBILE, API, INTERNAL, or INTEGRATION.
#
# TRACE ID PRIORITY:
#   When trace context is provided in multiple places:
#   1. `traceparent` HTTP header takes precedence (W3C Trace Context)
#   2. `extensions.traceId` is used as fallback if header is absent
#   3. If both present and conflict: header wins, extensions ignored (logged)
#
#   Conflicting trace IDs do NOT cause an error to avoid breaking
#   requests when proxies/gateways inject their own trace context.
#
# =============================================================================

# =============================================================================
# 6. DIRECTIVES
# =============================================================================

"Automatically trims leading and trailing whitespace from string input values."
directive @trim on INPUT_FIELD_DEFINITION | ARGUMENT_DEFINITION

# =============================================================================
# 7. SCALAR TYPES
# =============================================================================

# Note: The built-in ID scalar is used for entity identifiers.
# ID values are opaque strings in UUID v8 format.
# Format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
# Example: "019a6a3f-793e-807b-8001-555345529b44"
#
# UUID v8 (RFC 9562) bit layout (for debugging reference only):
# | Field           | Bits   | Description                              |
# |-----------------|--------|------------------------------------------|
# | Timestamp       | 0-47   | Unix milliseconds                        |
# | Version         | 48-51  | Fixed: 8                                 |
# | Counter         | 52-63  | Uniqueness within ms (0-4095)            |
# | Variant         | 64-65  | Fixed: 10 (RFC 4122)                     |
# | Deployment      | 66     | 0=SaaS, 1=On-Premise                     |
# | Reserved        | 67-74  | Future use (sharding)                    |
# | Region          | 75-79  | Data region (0-30), 31=test/default      |
# | Entity Type     | 80-111 | 4 ASCII chars (visible in hex)           |
# | Random          | 112-127| Crypto-random                            |

# @category: common
"An ISO 8601 datetime string with timezone (RFC 3339). Example: `2024-01-15T10:30:00Z`."
scalar DateTime
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/date-time.html")

# @category: common
"An ISO 8601 date string without time component (RFC 3339). Example: `2024-01-15`."
scalar Date
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/date.html")

# @category: common
"An arbitrary JSON value. Can be an object, array, string, number, boolean, or null."
scalar JSON @specifiedBy(url: "https://www.rfc-editor.org/rfc/rfc8259")

# @category: common
"A GeoJSON geometry object (RFC 7946). Supports Point, LineString, Polygon, and other geometry types."
scalar GeoJSON @specifiedBy(url: "https://www.rfc-editor.org/rfc/rfc7946")

# @category: common
"A geographic latitude coordinate in decimal degrees. Valid range: -90.0 to 90.0."
scalar Latitude
  @specifiedBy(
    url: "https://the-guild.dev/graphql/scalars/docs/scalars/latitude"
  )

# @category: common
"A geographic longitude coordinate in decimal degrees. Valid range: -180.0 to 180.0."
scalar Longitude
  @specifiedBy(
    url: "https://the-guild.dev/graphql/scalars/docs/scalars/longitude"
  )

# @category: common
"A BCP 47 language tag identifying a user locale. Example: `en-US`, `es-MX`, `fr-CA`."
scalar Locale
  @specifiedBy(url: "https://the-guild.dev/graphql/scalars/docs/scalars/locale")

# @category: common
"An email address conforming to RFC 5322. Example: `user@example.com`."
scalar EmailAddress
  @specifiedBy(
    url: "https://the-guild.dev/graphql/scalars/docs/scalars/email-address"
  )

# @category: common
"A hexadecimal color code. Supports 3-digit (`#RGB`) or 6-digit (`#RRGGBB`) format."
scalar HexColorCode
  @specifiedBy(
    url: "https://the-guild.dev/graphql/scalars/docs/scalars/hex-color-code"
  )

# @category: common
"An ISO 3166-1 alpha-2 country code. Example: `US`, `GB`, `ES`."
scalar CountryCode
  @specifiedBy(
    url: "https://the-guild.dev/graphql/scalars/docs/scalars/country-code"
  )

# @category: common
"""
A machine-readable identifier code.

Constraints:
- Allowed characters: ASCII letters (a-z, A-Z), digits (0-9), underscore (_), dot (.), hyphen (-)
- Must start with a letter or digit
- Case-insensitive for uniqueness checks
- Maximum length: 64 characters

Uniqueness:
- For catalog items: unique within the same catalog and organization scope
- For custom field definitions: unique per owner catalog item and organization
- For field options (OPTIONS type): unique within a single field definition
- Additional uniqueness requirements may apply depending on context (see individual fields)

Examples: DEVICE_TYPE, vehicle_car, status.active, sensor-v2, ABC123
"""
scalar Code @specifiedBy(url: "https://api.navixy.com/spec/scalars/code")

# @category: schedules
"A schedule data structure containing time intervals and recurrence rules."
scalar ScheduleData
  @specifiedBy(url: "https://api.navixy.com/spec/scalars/schedule-data")

# =============================================================================
# 8. ENUMS
# =============================================================================

# @category: common
"The direction for sorting query results."
enum OrderDirection {
  "Sort in ascending order (A→Z, 0→9, oldest→newest). NULL values appear last."
  ASC
  "Sort in descending order (Z→A, 9→0, newest→oldest). NULL values appear first."
  DESC
}

# @category: catalogs/catalog-items
"The origin of a catalog item, indicating how it was created."
enum CatalogItemOrigin {
  "Predefined by platform. Immutable and available to all organizations."
  SYSTEM
  "Created by the current organization."
  ORGANIZATION
  "Inherited from a parent organization in the dealer hierarchy."
  PARENT_ORGANIZATION
}

# @category: common
"The precision level of a total count value."
enum CountPrecision {
  "The count is exact, calculated using `COUNT(*)`."
  EXACT
  "The count is approximate, derived from table statistics."
  APPROXIMATE
  "At least this many items exist. Counting stopped early for performance reasons."
  AT_LEAST
}

# @category: organizations
