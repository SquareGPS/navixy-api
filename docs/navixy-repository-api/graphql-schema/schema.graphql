# --- CustomFieldDefinition ---

# @category: custom-fields
"""
A single operation on a custom field definition within the parent catalog item.
Exactly one action must be provided.
"""
input CustomFieldDefinitionInput @oneOf {
  "Create a new custom field definition."
  create: CustomFieldDefinitionCreateData
  "Update an existing custom field definition."
  update: CustomFieldDefinitionUpdateData
  "Delete a custom field definition."
  delete: CustomFieldDefinitionDeleteData
  "Archive a custom field definition (non-destructive deactivation)."
  archive: CustomFieldDefinitionArchiveData
  "Restore a previously archived custom field definition."
  restore: CustomFieldDefinitionRestoreData
}

# @category: custom-fields
"Data for creating a custom field definition within its parent catalog item."
input CustomFieldDefinitionCreateData {
  "The machine-readable code. Auto-generated from title if omitted."
  code: Code
  "The display name."
  title: String! @trim
  "The description."
  description: String @trim
  "The data type. Immutable after creation."
  fieldType: FieldType!
  "The display order. Auto-calculated as last position if omitted."
  order: Int
  "The type-specific parameters. Exactly one variant must be provided."
  params: FieldParamsInput!
}

# @category: custom-fields
"Data for updating an existing custom field definition. Note: `fieldType` cannot be changed."
input CustomFieldDefinitionUpdateData {
  "The code of the field definition to update."
  code: Code!
  "The new display name."
  title: String @trim
  "The new description."
  description: String @trim
  "The new display order."
  order: Int
  "The updated parameters. Only `isRequired` and type-specific fields can be changed."
  params: FieldParamsInput
}

# @category: custom-fields
"""
Data for permanently deleting a custom field definition.

If entities have values for this field, the default behavior is to reject the deletion.
Use `onValues: CASCADE` to explicitly allow deletion with all associated values.

Prefer archiving for non-destructive deactivation.
"""
input CustomFieldDefinitionDeleteData {
  "The code of the field definition to delete."
  code: Code!
  """
  What to do when existing entities have values for this field.
  Defaults to `REJECT` to prevent accidental data loss.
  """
  onValues: CustomFieldDefinitionDeleteBehavior = REJECT
}

# @category: custom-fields
"""
Data for archiving or restoring a custom field definition.

Archiving deactivates the field without data loss:
- The field definition and all its values are preserved.
- The field no longer appears in forms and accepts no new values.
- Existing values remain readable and visible in history/exports.
"""
input CustomFieldDefinitionArchiveData {
  "The code of the field definition to archive."
  code: Code!
}

# @category: custom-fields
"Data for restoring a previously archived custom field definition."
input CustomFieldDefinitionRestoreData {
  "The code of the field definition to restore."
  code: Code!
}

# @category: custom-fields
"Field parameters input. Exactly one field must be provided."
input FieldParamsInput @oneOf {
  "Parameters for STRING field type."
  string: StringFieldParamsInput
  "Parameters for TEXT field type."
  text: TextFieldParamsInput
  "Parameters for NUMBER field type."
  number: NumberFieldParamsInput
  "Parameters for BOOLEAN field type."
  boolean: BooleanFieldParamsInput
  "Parameters for DATE field type."
  date: DateFieldParamsInput
  "Parameters for DATETIME field type."
  datetime: DateTimeFieldParamsInput
  "Parameters for GEOJSON field type."
  geojson: GeoJsonFieldParamsInput
  "Parameters for SCHEDULE field type."
  schedule: ScheduleFieldParamsInput
  "Parameters for OPTIONS field type."
  options: OptionsFieldParamsInput
  "Parameters for DEVICE field type."
  device: DeviceFieldParamsInput
  "Parameters for REFERENCE field type."
  reference: ReferenceFieldParamsInput
  "Parameters for CATALOG field type."
  catalog: CatalogFieldParamsInput
  "Parameters for TAG field type."
  tag: TagFieldParamsInput
}

# @category: custom-fields
"Parameters for STRING field type."
input StringFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The minimum character length."
  minLength: Int
  "The maximum character length."
  maxLength: Int
  "The default value."
  defaultValue: String
  "Whether to trim whitespace."
  trim: Boolean = true
}

# @category: custom-fields
"Parameters for TEXT field type."
input TextFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The maximum character length."
  maxLength: Int
  "The default value."
  defaultValue: String
  "Whether to trim whitespace."
  trim: Boolean = false
}

# @category: custom-fields
"Parameters for NUMBER field type."
input NumberFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The minimum allowed value."
  min: Float
  "The maximum allowed value."
  max: Float
  "The decimal precision."
  precision: Int
  "The default value."
  defaultValue: Float
}

# @category: custom-fields
"Parameters for BOOLEAN field type."
input BooleanFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The default value."
  defaultValue: Boolean
}

# @category: custom-fields
"Parameters for DATE field type."
input DateFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The default value."
  defaultValue: Date
}

# @category: custom-fields
"Parameters for DATETIME field type."
input DateTimeFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The default value."
  defaultValue: DateTime
}

# @category: custom-fields
"Parameters for GEOJSON field type."
input GeoJsonFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The allowed geometry types. Null means all types are allowed."
  allowedTypes: [GeoJsonGeometryType!]
}

# @category: custom-fields
"Parameters for SCHEDULE field type."
input ScheduleFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
}

# @category: custom-fields
"Parameters for OPTIONS field type."
input OptionsFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "Whether multiple options can be selected."
  isMulti: Boolean = false
  "The available options."
  options: [FieldOptionInput!]!
  "The default option code."
  defaultValue: Code
}

# @category: custom-fields
"""
Input for an option definition.
When updating options: if an entry without `code` is provided, a new option is created.
If the label already exists within this field, an error is returned.
"""
input FieldOptionInput {
  "The unique code. Auto-generated from label if omitted."
  code: Code
  "The display label. Must be unique within the custom field."
  label: String!
  "The description."
  description: String
  "Whether this option is archived."
  isArchived: Boolean = false
}

# @category: custom-fields
"Parameters for DEVICE field type."
input DeviceFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
}

# @category: custom-fields
"Parameters for REFERENCE field type."
input ReferenceFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "The entity type code that can be referenced."
  refEntityTypeCode: Code!
}

# @category: custom-fields
"Parameters for CATALOG field type."
input CatalogFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "Whether multiple items can be selected."
  isMulti: Boolean = false
  "The catalog code that items can be selected from."
  refCatalogCode: Code!
  "The default item code."
  defaultValue: Code
}

# @category: custom-fields
"Parameters for TAG field type."
input TagFieldParamsInput {
  "Whether a value is required."
  isRequired: Boolean!
  "Whether multiple tags can be selected."
  isMulti: Boolean = false
  "The default tag code."
  defaultValue: Code
}

